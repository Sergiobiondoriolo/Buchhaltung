// ── Custom Charts (no external library needed) ───────────────────
function BarChartCustom({ data }) {
  const max = Math.max(...data.map(d => Math.max(d.Einnahmen||0, d.Ausgaben||0)), 1);
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:200,padding:"0 4px"}}>
      {data.filter(d=>d.Einnahmen>0||d.Ausgaben>0).map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={{width:"100%",display:"flex",gap:1,alignItems:"flex-end",height:170}}>
            <div style={{flex:1,background:"#10B981",borderRadius:"3px 3px 0 0",height:`${(d.Einnahmen/max)*100}%`,minHeight:d.Einnahmen>0?2:0,transition:"height 0.5s"}}/>
            <div style={{flex:1,background:"#EF4444",borderRadius:"3px 3px 0 0",height:`${(d.Ausgaben/max)*100}%`,minHeight:d.Ausgaben>0?2:0,transition:"height 0.5s"}}/>
          </div>
          <div style={{fontSize:9,color:"#64748B",textAlign:"center"}}>{d.name}</div>
        </div>
      ))}
    </div>
  );
}

function PieChartCustom({ data }) {
  const COLORS = ["#F59E0B","#10B981","#3B82F6","#8B5CF6","#EC4899"];
  const total = data.reduce((s,d)=>s+d.value,0);
  if(!total) return <div style={{textAlign:"center",color:"#64748B",padding:40}}>Keine Daten</div>;
  let offset = 0;
  const size = 140, cx = 70, cy = 70, r = 55, ir = 35;
  const slices = data.map((d,i)=>{
    const pct = d.value/total;
    const start = offset;
    offset += pct;
    const a1 = start*2*Math.PI - Math.PI/2;
    const a2 = offset*2*Math.PI - Math.PI/2;
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    const ix1=cx+ir*Math.cos(a1), iy1=cy+ir*Math.sin(a1);
    const ix2=cx+ir*Math.cos(a2), iy2=cy+ir*Math.sin(a2);
    const large = pct>0.5?1:0;
    return <path key={i} d={`M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${large},0 ${ix1},${iy1}`} fill={COLORS[i%COLORS.length]} stroke="#111827" strokeWidth="1"/>;
  });
  return (
    <div>
      <svg width={size} height={size} style={{display:"block",margin:"0 auto"}}>{slices}</svg>
      <div style={{display:"flex",flexWrap:"wrap",gap:"4px 12px",marginTop:8,justifyContent:"center"}}>
        {data.map((d,i)=><div key={d.name} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#64748B"}}><div style={{width:7,height:7,borderRadius:2,background:COLORS[i%COLORS.length]}}/>{d.name}</div>)}
      </div>
    </div>
  );
}

// ── GitHub Gist API ──────────────────────────────────────────────
async function gistLoad(token, gistId) {
  const r = await fetch(`https://api.github.com/gists/${gistId}`,{headers:{Authorization:`token ${token}`}});
  if(!r.ok) throw new Error(`GitHub Fehler: ${r.status}`);
  const j = await r.json();
  const c = j.files?.[GIST_FILE]?.content;
  if(!c) throw new Error("Datei nicht im Gist gefunden");
  return JSON.parse(c);
}
async function gistSave(token, gistId, payload) {
  const r = await fetch(`https://api.github.com/gists/${gistId}`,{
    method:"PATCH",
    headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(payload,null,2)}}})
  });
  if(!r.ok) throw new Error(`Speichern fehlgeschlagen: ${r.status}`);
}
async function gistCreate(token, data, profile) {
  const r = await fetch("https://api.github.com/gists",{
    method:"POST",
    headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({description:"Buchhaltung Pro Sync",public:false,files:{[GIST_FILE]:{content:JSON.stringify({data,profile},null,2)}}})
  });
  if(!r.ok) throw new Error(`Fehler ${r.status} – Token korrekt?`);
  return (await r.json()).id;
}

// ── Storage ──────────────────────────────────────────────────────
const LS = {
  get: k => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} },
};

function useStorage() {
  const [data, setDataState] = useState(INITIAL_DATA);
  const [profile, setProfileState] = useState(DEFAULT_PROFILE);
  const [gistCfg, setGistCfgState] = useState({token:"",gistId:""});
  const [loaded, setLoaded] = useState(false);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [syncMsg, setSyncMsg] = useState("");
  const [lastSync, setLastSync] = useState(null);
  const timer = useRef(null);

  useEffect(()=>{
    const d = LS.get("biz-data"); if(d) setDataState(d);
    const p = LS.get("biz-profile"); if(p) setProfileState(p);
    const g = LS.get("biz-gist"); if(g) {
      setGistCfgState(g);
      if(g.token && g.gistId) {
        setSyncStatus("syncing");
        gistLoad(g.token,g.gistId).then(remote=>{
          if(remote.data){ setDataState(remote.data); LS.set("biz-data",remote.data); }
          if(remote.profile){ setProfileState(remote.profile); LS.set("biz-profile",remote.profile); }
          setLastSync(new Date()); setSyncStatus("success"); setSyncMsg("Daten von GitHub geladen ✓");
          setTimeout(()=>setSyncStatus("idle"),3000);
        }).catch(e=>{ setSyncStatus("error"); setSyncMsg(e.message); setTimeout(()=>setSyncStatus("idle"),5000); });
      }
    }
    setLoaded(true);
  },[]);

  const doPush = useCallback((d,p,cfg)=>{
    if(!cfg||!cfg.token||!cfg.gistId) return;
    clearTimeout(timer.current);
    timer.current = setTimeout(async()=>{
      try {
        setSyncStatus("syncing");
        const dd = d || LS.get("biz-data") || INITIAL_DATA;
        const pp = p || LS.get("biz-profile") || DEFAULT_PROFILE;
        await gistSave(cfg.token,cfg.gistId,{data:dd,profile:pp});
        setLastSync(new Date()); setSyncStatus("success"); setSyncMsg("GitHub Sync ✓");
        setTimeout(()=>setSyncStatus("idle"),2500);
      } catch(e){ setSyncStatus("error"); setSyncMsg(e.message); setTimeout(()=>setSyncStatus("idle"),5000); }
    },1500);
  },[]);

  const setData = useCallback(upd=>{
    setDataState(prev=>{
      const next = typeof upd==="function"?upd(prev):upd;
      LS.set("biz-data",next);
      setGistCfgState(cfg=>{ doPush(next,null,cfg); return cfg; });
      return next;
    });
  },[doPush]);

  const setProfile = useCallback(upd=>{
    setProfileState(prev=>{
      const next = typeof upd==="function"?upd(prev):upd;
      LS.set("biz-profile",next);
      setGistCfgState(cfg=>{ doPush(null,next,cfg); return cfg; });
      return next;
    });
  },[doPush]);

  const saveGistCfg = useCallback(cfg=>{ setGistCfgState(cfg); LS.set("biz-gist",cfg); },[]);

  const manualSync = useCallback(async dir=>{
    const cfg = LS.get("biz-gist");
    if(!cfg?.token||!cfg?.gistId) return;
    setSyncStatus("syncing");
    try {
      if(dir==="pull"){
        const r = await gistLoad(cfg.token,cfg.gistId);
        if(r.data){ setDataState(r.data); LS.set("biz-data",r.data); }
        if(r.profile){ setProfileState(r.profile); LS.set("biz-profile",r.profile); }
        setSyncMsg("Von GitHub geladen ✓");
      } else {
        const d=LS.get("biz-data")||INITIAL_DATA, p=LS.get("biz-profile")||DEFAULT_PROFILE;
        await gistSave(cfg.token,cfg.gistId,{data:d,profile:p});
        setSyncMsg("Zu GitHub gespeichert ✓");
      }
      setLastSync(new Date()); setSyncStatus("success"); setTimeout(()=>setSyncStatus("idle"),3000);
    } catch(e){ setSyncStatus("error"); setSyncMsg(e.message); setTimeout(()=>setSyncStatus("idle"),5000); }
  },[]);

  return {data,setData,profile,setProfile,loaded,gistCfg,saveGistCfg,syncStatus,syncMsg,lastSync,manualSync};
}

// ── Sync Button ───────────────────────────────────────────────────
function SyncBtn({status,msg,lastSync,hasConfig,onPull,onPush}){
  const [open,setOpen]=useState(false);
  const C={idle:T.sub,syncing:T.info,success:T.success,error:T.danger};
  const I={idle:"⟳",syncing:"⟳",success:"✓",error:"⚠"};
  const L={idle:hasConfig?"Sync aktiv":"Kein Sync",syncing:"Synchronisiert...",success:msg,error:msg};
  return(
    <div style={{position:"relative"}}>
      <div onClick={()=>setOpen(!open)} className="btn" style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:`${C[status]}18`,border:`1px solid ${C[status]}40`,borderRadius:8,cursor:"pointer"}}>
        <span style={{color:C[status],fontSize:14,display:"inline-block",animation:status==="syncing"?"spin 1s linear infinite":"none"}}>{I[status]}</span>
        <span style={{fontSize:12,color:C[status],fontWeight:600}}>{L[status]}</span>
      </div>
      {open&&(
        <div onClick={()=>setOpen(false)} style={{position:"fixed",inset:0,zIndex:99}}>
          <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:"calc(100% + 8px)",right:0,background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:12,padding:16,width:260,zIndex:100,boxShadow:"0 20px 40px #00000060"}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>GitHub Gist Sync</div>
            {!hasConfig?(
              <div style={{fontSize:12,color:T.sub,lineHeight:1.6}}>Noch nicht eingerichtet. Gehe zu <strong style={{color:T.accent}}>Einstellungen</strong>.</div>
            ):(
              <>
                <div style={{fontSize:11,color:T.sub,marginBottom:12}}>{lastSync?`Letzter Sync: ${lastSync.toLocaleTimeString("de-DE")}`:"Noch kein Sync"}</div>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn" onClick={()=>{onPull();setOpen(false);}} style={{flex:1,padding:"8px",background:`${T.info}20`,color:T.info,border:`1px solid ${T.info}40`,borderRadius:8,fontWeight:700,fontSize:12}}>⬇ Laden</button>
                  <button className="btn" onClick={()=>{onPush();setOpen(false);}} style={{flex:1,padding:"8px",background:`${T.success}20`,color:T.success,border:`1px solid ${T.success}40`,borderRadius:8,fontWeight:700,fontSize:12}}>⬆ Hochladen</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Search ────────────────────────────────────────────────────────
function SearchDrop({search,data,setView,setSearch}){
  const q=search.toLowerCase();
  const tx=data.transactions.filter(t=>t.desc.toLowerCase().includes(q)).slice(0,3);
  const inv=data.invoices.filter(i=>i.number?.toLowerCase().includes(q)||i.clientName?.toLowerCase().includes(q)).slice(0,3);
  const cust=data.customers.filter(c=>c.name.toLowerCase().includes(q)).slice(0,2);
  if(!tx.length&&!inv.length&&!cust.length) return null;
  return(
    <div style={{position:"absolute",top:"100%",right:0,width:300,background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:12,padding:10,marginTop:6,zIndex:100,boxShadow:"0 20px 40px #00000060"}}>
      {cust.length>0&&<><SG l="Kunden"/>{cust.map(c=><SI key={c.id} icon="◎" label={c.name} sub={c.city} onClick={()=>{setView("customers");setSearch("");}}/>)}</>}
      {inv.length>0&&<><SG l="Rechnungen"/>{inv.map(i=><SI key={i.id} icon="▤" label={i.number} sub={i.clientName} onClick={()=>{setView("invoices");setSearch("");}}/>)}</>}
      {tx.length>0&&<><SG l="Transaktionen"/>{tx.map(t=><SI key={t.id} icon="⇅" label={t.desc} sub={eur(t.amount)} onClick={()=>{setView("transactions");setSearch("");}}/>)}</>}
    </div>
  );
}
const SG=({l})=><div style={{fontSize:10,color:T.sub,fontWeight:700,letterSpacing:1,padding:"6px 8px 2px",textTransform:"uppercase"}}>{l}</div>;
const SI=({icon,label,sub,onClick})=>(
  <div onClick={onClick} className="search-item" style={{display:"flex",gap:8,alignItems:"center",padding:"7px 8px",borderRadius:8,cursor:"pointer"}}>
    <span style={{color:T.accent,width:16}}>{icon}</span>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{label}</div>

    </div>
  </div>
);

// ── Export/Import ─────────────────────────────────────────────────
function ExportBtn({data,profile,setData}){
  const [open,setOpen]=useState(false);
  const ref=useRef();
  const doExport=()=>{
    const b=new Blob([JSON.stringify({data,profile,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`buchhaltung-${todayStr()}.json`;a.click();
    setOpen(false);
  };
  const doImport=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(p.data)setData(p.data);}catch{}};r.readAsText(f);
    setOpen(false);
  };
  return(
    <div style={{position:"relative"}}>
      <button className="btn" onClick={()=>setOpen(!open)} style={{...GhostStyle,fontSize:12,padding:"7px 14px"}}>↕ Export/Import</button>
      {open&&(
        <div onClick={()=>setOpen(false)} style={{position:"fixed",inset:0,zIndex:99}}>
          <div onClick={e=>e.stopPropagation()} style={{position:"absolute",right:0,top:"calc(100%+6px)",background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:10,padding:8,zIndex:100,width:180,marginTop:6}}>
            <button className="btn" onClick={doExport} style={{...GhostStyle,width:"100%",textAlign:"left",padding:"8px 12px",fontSize:13}}>⬇ Exportieren</button>
            <label style={{display:"block",cursor:"pointer"}}>
              <input ref={ref} type="file" accept=".json" onChange={doImport} style={{display:"none"}}/>
              <span className="btn" style={{...GhostStyle,display:"block",padding:"8px 12px",fontSize:13}}>⬆ Importieren</span>
            </label>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────

  const months=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];

    const mo=(i+1).toString().padStart(2,"0");

    const i2=data.transactions.filter(t=>t.type==="income"&&t.date?.startsWith(pf)).reduce((s,t)=>s+t.amount,0);

        <div style={{color:T.sub,fontSize:14}}>Unternehmensübersicht {yr}</div>

          {l:"Offene Rechnungen",v:eur(openInv.reduce((s,i)=>s+(i.total||0),0)),c:T.accent,cl:()=>setView("invoices")},
          {l:"Überfällig",v:overdueInv.length,c:overdueInv.length>0?T.danger:T.sub,cl:()=>setView("invoices")},
        ].map(k=>(
          <div key={k.l} onClick={k.cl} className="card-hover" style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:"16px 18px",cursor:"pointer"}}>
            <div style={{fontSize:10,color:T.sub,fontWeight:600,marginBottom:8,letterSpacing:0.5}}>{k.l.toUpperCase()}</div>
            <div style={{fontSize:20,fontWeight:800,color:k.c}}>{k.v}</div>
          </div>
        ))}
      </div>

      {pct>50&&(
        <div style={{background:pct>85?"#EF444412":"#F59E0B0A",border:`1px solid ${pct>85?T.danger:T.accent}40`,borderRadius:12,padding:"14px 20px",marginBottom:22,display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:24}}>{pct>85?"🚨":"⚠️"}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:3,color:pct>85?T.danger:T.accent}}>{pct>85?"Achtung: 22.000€ Grenze fast erreicht!":"Hinweis: 22.000€ Grenze im Blick behalten"}</div>
            <div style={{fontSize:13,color:T.sub}}>{eur(yearIncome)} von {eur(LIMIT_22K)} ({pct.toFixed(0)}%)</div>
          </div>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:18,marginBottom:20}}>
        <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:22}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:18}}>Jahresübersicht {yr}</div>
          <div style={{display:"flex",gap:12,marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:T.sub}}><div style={{width:8,height:8,borderRadius:2,background:T.success}}/>Einnahmen</div>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:T.sub}}><div style={{width:8,height:8,borderRadius:2,background:T.danger}}/>Ausgaben</div>

      <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:18}}>

        <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:22}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            Offene Rechnungen

              <div><div style={{fontSize:13,fontWeight:600}}>{inv.number}</div><div style={{fontSize:11,color:T.sub}}>{inv.clientName} · {inv.dueDate||"—"}</div></div>

                <div style={{fontWeight:700,fontSize:14}}>{eur(inv.total)}</div>
                <Tag c={inv.dueDate&&new Date(inv.dueDate)<new Date()?T.danger:T.accent}>{inv.dueDate&&new Date(inv.dueDate)<new Date()?"überfällig":inv.status}</Tag>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Transactions ──────────────────────────────────────────────────
function Transactions({data,setData}){
  const [modal,setModal]=useState(false);
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [form,setForm]=useState({type:"income",date:todayStr(),category:"",desc:"",amount:""});
  const filtered=data.transactions.filter(t=>{
    if(filter!=="all"&&t.type!==filter)return false;
    if(search&&!t.desc.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const inc=filtered.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const exp=filtered.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const add=()=>{
    if(!form.desc||!form.amount||!form.category)return;
    setData(d=>({...d,transactions:[...d.transactions,{...form,id:uid(),amount:parseFloat(form.amount)}]}));
    setForm({type:"income",date:todayStr(),category:"",desc:"",amount:""});
    setModal(false);
  };
  return(
    <div className="animate-in">
      <PHdr title="Einnahmen & Ausgaben" sub="Verwalte alle Buchungen"><Btn onClick={()=>setModal(true)}>+ Eintrag</Btn></PHdr>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:22}}>
        <SC l="Einnahmen" v={eur(inc)} c={T.success}/>
        <SC l="Ausgaben" v={eur(exp)} c={T.danger}/>
        <SC l="Saldo" v={eur(inc-exp)} c={(inc-exp)>=0?T.success:T.danger}/>
      </div>
      <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,overflow:"hidden"}}>
        <div style={{padding:"14px 20px",borderBottom:`1px solid ${T.cardBorder}`,display:"flex",gap:8,alignItems:"center"}}>
          {[["all","Alle"],["income","Einnahmen"],["expense","Ausgaben"]].map(([v,l])=>(
            <PBtn key={v} active={filter===v} onClick={()=>setFilter(v)}>{l}</PBtn>
          ))}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Suchen..." style={{...IS,padding:"5px 12px",fontSize:12,width:160,marginLeft:"auto"}}/>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Typ","Datum","Beschreibung","Kategorie","Betrag",""].map(h=><Th key={h}>{h}</Th>)}</tr></thead>
          <tbody>
            {filtered.length===0?<tr><td colSpan={6} style={{padding:40,textAlign:"center",color:T.sub}}>Keine Einträge</td></tr>
              :filtered.map(tx=>(
              <tr key={tx.id} className="tr-hover">
                <Td><Tag c={tx.type==="income"?T.success:T.danger}>{tx.type==="income"?"↑ Einnahme":"↓ Ausgabe"}</Tag></Td>
                <Td s={{color:T.sub}}>{tx.date}</Td>
                <Td>{tx.desc}</Td>
                <Td><Tag c={T.accent}>{tx.category}</Tag></Td>
                <Td s={{fontWeight:700,textAlign:"right",color:tx.type==="income"?T.success:T.danger}}>{tx.type==="income"?"+":"-"}{eur(tx.amount)}</Td>
                <Td><button onClick={()=>setData(d=>({...d,transactions:d.transactions.filter(x=>x.id!==tx.id)}))} style={DelS}>✕</button></Td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal&&<Modal title="Neuer Eintrag" onClose={()=>setModal(false)}>
        <div style={{display:"grid",gap:14}}>
          <div><Lbl>Typ</Lbl><div style={{display:"flex",gap:8}}>
            {[["income","↑ Einnahme",T.success],["expense","↓ Ausgabe",T.danger]].map(([v,l,c])=>(
              <TBtn key={v} active={form.type===v} color={c} onClick={()=>setForm(f=>({...f,type:v,category:""}))}>{l}</TBtn>
            ))}
          </div></div>
          <R2><F l="Datum" t="date" v={form.date} s={v=>setForm(f=>({...f,date:v}))}/><div><Lbl>Kategorie</Lbl><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={IS}><option value="">Wählen...</option>{(form.type==="income"?INCOME_CATS:EXPENSE_CATS).map(c=><option key={c}>{c}</option>)}</select></div></R2>
          <F l="Beschreibung" v={form.desc} s={v=>setForm(f=>({...f,desc:v}))} p="z.B. Webdesign Projekt"/>
          <F l="Betrag (€)" t="number" v={form.amount} s={v=>setForm(f=>({...f,amount:v}))} p="0.00"/>
          <BR><Btn onClick={add}>Speichern</Btn><BG onClick={()=>setModal(false)}>Abbrechen</BG></BR>
        </div>
      </Modal>}
    </div>
  );
}

// ── Invoices ──────────────────────────────────────────────────────
function Invoices({data,setData,profile}){
  const [modal,setModal]=useState(false);
  const [preview,setPreview]=useState(null);
  const [filterS,setFilterS]=useState("all");
  const nextNum=()=>{const yr=new Date().getFullYear();const ns=data.invoices.filter(i=>i.number?.startsWith(`RE-${yr}`)).map(i=>parseInt(i.number.split("-").pop())||0);return `RE-${yr}-${String(Math.max(0,...ns)+1).padStart(3,"0")}`;};
  const blank=()=>({number:nextNum(),date:todayStr(),dueDate:"",clientName:"",clientAddress:"",clientEmail:"",items:[{id:uid(),desc:"",qty:1,price:""}],note:profile.invoiceNote||"Gemäß §19 Abs. 1 UStG wird keine Umsatzsteuer berechnet.",status:"entwurf",customerId:""});
  const [form,setForm]=useState(blank);
  const total=items=>items.reduce((s,i)=>s+((parseFloat(i.qty)||0)*(parseFloat(i.price)||0)),0);
  const save=()=>{
    setData(d=>({...d,invoices:[...d.invoices,{...form,id:uid(),total:total(form.items),createdAt:todayStr()}]}));
    setModal(false);setForm(blank());
  };
  const upSt=(id,st)=>setData(d=>({...d,invoices:d.invoices.map(i=>i.id===id?{...i,status:st}:i)}));
  const SC_COLORS={entwurf:T.sub,gesendet:T.info,offen:T.accent,bezahlt:T.success,storniert:T.sub};
  const fillCust=id=>{const c=data.customers.find(x=>x.id===id);if(!c)return;setForm(f=>({...f,customerId:id,clientName:c.name,clientAddress:`${c.street}\n${c.zip} ${c.city}`,clientEmail:c.email}));};
  const filtered=data.invoices.filter(i=>filterS==="all"||i.status===filterS).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return(
    <div className="animate-in">
      <PHdr title="Rechnungen" sub="Erstelle und verwalte Rechnungen"><Btn onClick={()=>{setForm(blank());setModal(true);}}>+ Neue Rechnung</Btn></PHdr>

        <SC l="Gesamt" v={data.invoices.length} c={T.text}/>

        <SC l="Bezahlt" v={data.invoices.filter(i=>i.status==="bezahlt").length} c={T.success}/>

      <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,overflow:"hidden"}}>
        <div style={{padding:"12px 20px",borderBottom:`1px solid ${T.cardBorder}`,display:"flex",gap:8}}>

        </div>

          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["Nummer","Kunde","Datum","Fällig","Status","Betrag",""].map(h=><Th key={h}>{h}</Th>)}</tr></thead>

                  <Td s={{color:T.sub}}>{inv.date}</Td>
                  <Td s={{color:ov?T.danger:T.sub}}>{inv.dueDate||"—"}</Td>

                    <button onClick={()=>setData(d=>({...d,invoices:d.invoices.filter(x=>x.id!==inv.id)}))} style={DelS}>✕</button>

              );

          </table>

          <F l="Rechnungsnummer" v={form.number} s={v=>setForm(f=>({...f,number:v}))}/>
          <R2><F l="Datum" t="date" v={form.date} s={v=>setForm(f=>({...f,date:v}))}/><F l="Fällig am" t="date" v={form.dueDate} s={v=>setForm(f=>({...f,dueDate:v}))}/></R2>
          <div style={{gridColumn:"1/-1"}}><Lbl>Kunde aus Stamm</Lbl><select onChange={e=>fillCust(e.target.value)} style={IS}><option value="">-- Kunden wählen --</option>{data.customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <F l="Kundenname" v={form.clientName} s={v=>setForm(f=>({...f,clientName:v}))}/>
          <F l="E-Mail" v={form.clientEmail} s={v=>setForm(f=>({...f,clientEmail:v}))}/>
          <div style={{gridColumn:"1/-1"}}><Lbl>Adresse</Lbl><textarea value={form.clientAddress} onChange={e=>setForm(f=>({...f,clientAddress:e.target.value}))} rows={2} style={{...IS,resize:"vertical"}}/></div>
          <div style={{gridColumn:"1/-1"}}><SL>Positionen</SL></div>
        </div>
        <InvItems items={form.items} setItems={items=>setForm(f=>({...f,items}))}/>

}

function Offers({data,setData,profile}){
  const [modal,setModal]=useState(false);
  const nextNum=()=>{const yr=new Date().getFullYear();const ns=data.offers.filter(o=>o.number?.startsWith(`AN-${yr}`)).map(o=>parseInt(o.number.split("-").pop())||0);return `AN-${yr}-${String(Math.max(0,...ns)+1).padStart(3,"0")}`;};
  const blank=()=>({number:nextNum(),date:todayStr(),validUntil:"",clientName:"",clientAddress:"",clientEmail:"",items:[{id:uid(),desc:"",qty:1,price:""}],note:"Dieses Angebot ist gültig bis zum oben genannten Datum.",status:"offen"});
  const [form,setForm]=useState(blank);
  const total=items=>items.reduce((s,i)=>s+((parseFloat(i.qty)||0)*(parseFloat(i.price)||0)),0);
  const save=()=>{setData(d=>({...d,offers:[...d.offers,{...form,id:uid(),total:total(form.items),createdAt:todayStr()}]}));setModal(false);setForm(blank());};
  const convertToInv=offer=>{
    const yr=new Date().getFullYear();
    const ns=data.invoices.filter(i=>i.number?.startsWith(`RE-${yr}`)).map(i=>parseInt(i.number.split("-").pop())||0);
    const num=`RE-${yr}-${String(Math.max(0,...ns)+1).padStart(3,"0")}`;
    const inv={...offer,id:uid(),number:num,status:"entwurf",note:profile.invoiceNote||"Gemäß §19 Abs. 1 UStG wird keine Umsatzsteuer berechnet.",dueDate:"",createdAt:todayStr()};
    setData(d=>({...d,invoices:[...d.invoices,inv],offers:d.offers.map(o=>o.id===offer.id?{...o,status:"angenommen"}:o)}));
  };
  return(
    <div className="animate-in">
      <PHdr title="Angebote" sub="Erstelle Angebote und wandle sie in Rechnungen um"><Btn onClick={()=>{setForm(blank());setModal(true);}}>+ Neues Angebot</Btn></PHdr>

          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["Nummer","Kunde","Datum","Gültig bis","Status","Betrag",""].map(h=><Th key={h}>{h}</Th>)}</tr></thead>
            <tbody>{[...data.offers].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(o=>(
              <tr key={o.id} className="tr-hover">
                <Td s={{fontWeight:700}}>{o.number}</Td><Td>{o.clientName||"—"}</Td><Td s={{color:T.sub}}>{o.date}</Td><Td s={{color:T.sub}}>{o.validUntil||"—"}</Td>
                <Td><Tag c={o.status==="angenommen"?T.success:o.status==="abgelehnt"?T.danger:T.accent}>{o.status}</Tag></Td>
                <Td s={{fontWeight:700,textAlign:"right"}}>{eur(o.total)}</Td>
                <Td><div style={{display:"flex",gap:5}}>
                  {o.status==="offen"&&<SB onClick={()=>convertToInv(o)} c={T.success}>→ Rechnung</SB>}
                  {o.status==="offen"&&<SB onClick={()=>setData(d=>({...d,offers:d.offers.map(x=>x.id===o.id?{...x,status:"abgelehnt"}:x)}))} c={T.danger}>Ablehnen</SB>}
                  <button onClick={()=>setData(d=>({...d,offers:d.offers.filter(x=>x.id!==o.id)}))} style={DelS}>✕</button>
                </div></Td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      )}
      {modal&&<Modal title="Neues Angebot" onClose={()=>setModal(false)} wide>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <F l="Angebotsnummer" v={form.number} s={v=>setForm(f=>({...f,number:v}))}/>
          <R2><F l="Datum" t="date" v={form.date} s={v=>setForm(f=>({...f,date:v}))}/><F l="Gültig bis" t="date" v={form.validUntil} s={v=>setForm(f=>({...f,validUntil:v}))}/></R2>
          <F l="Kundenname" v={form.clientName} s={v=>setForm(f=>({...f,clientName:v}))}/>
          <F l="E-Mail" v={form.clientEmail} s={v=>setForm(f=>({...f,clientEmail:v}))}/>
          <div style={{gridColumn:"1/-1"}}><Lbl>Adresse</Lbl><textarea value={form.clientAddress} onChange={e=>setForm(f=>({...f,clientAddress:e.target.value}))} rows={2} style={{...IS,resize:"vertical"}}/></div>
          <div style={{gridColumn:"1/-1"}}><SL>Positionen</SL></div>
        </div>
        <InvItems items={form.items} setItems={items=>setForm(f=>({...f,items}))}/>
        <div style={{textAlign:"right",marginBottom:14}}><span style={{fontSize:13,color:T.sub}}>Gesamt: </span><span style={{fontSize:20,fontWeight:800,color:T.accent}}>{eur(total(form.items))}</span></div>
        <F l="Notiz" v={form.note} s={v=>setForm(f=>({...f,note:v}))}/>

function Receipts({data,setData,drive}){
  const [modal,setModal]=useState(false);
  const [tab,setTab]=useState("upload");
  const [form,setForm]=useState({name:"",date:todayStr(),amount:"",category:"",note:"",file:null,driveLink:null});
  const [cf,setCf]=useState({vendor:"",date:todayStr(),amount:"",category:"",note:""});
  const [uploading,setUploading]=useState(false);
  const ref=useRef();
  const CATS=["Büro","Software","Reise","Marketing","Bewirtung","Fahrzeug","Sonstiges"];

  const save=async()=>{
    let driveLink = form.driveLink;
    // Auto-upload to Drive if connected and file selected
    if(tab==="upload" && form.file && drive.isTokenValid()) {
      try {
        setUploading(true);
        const result = await drive.uploadFile(form.file, "Belege");
        driveLink = result.webViewLink;
      } catch(e) {} finally { setUploading(false); }
    }
    const r=tab==="upload"
      ?{...form,id:uid(),type:"upload",amount:parseFloat(form.amount)||0,createdAt:todayStr(),driveLink}
      :{...cf,id:uid(),type:"created",amount:parseFloat(cf.amount)||0,createdAt:todayStr()};
    setData(d=>({...d,receipts:[...d.receipts,r]}));
    setModal(false);
    setForm({name:"",date:todayStr(),amount:"",category:"",note:"",file:null,driveLink:null});
    setCf({vendor:"",date:todayStr(),amount:"",category:"",note:""});
  };
  return(
    <div className="animate-in">
      <PHdr title="Belege" sub={`${data.receipts.length} Belege`}><Btn onClick={()=>setModal(true)}>+ Beleg</Btn></PHdr>
      {data.receipts.length===0?<EC icon="◈" title="Noch keine Belege" sub="Lade Belege hoch oder erstelle eigene"/>:(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
          {[...data.receipts].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>(
            <div key={r.id} style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:18}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                <Tag c={r.type==="upload"?T.accent:T.success}>{r.type==="upload"?"⬆ Upload":"✎ Erstellt"}</Tag>
                <button onClick={()=>setData(d=>({...d,receipts:d.receipts.filter(x=>x.id!==r.id)}))} style={DelS}>✕</button>
              </div>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{r.name||r.vendor||"Beleg"}</div>
              <div style={{fontSize:12,color:T.sub,marginBottom:10}}>{r.date}{r.category?` · ${r.category}`:""}</div>
              {r.amount>0&&<div style={{fontSize:18,fontWeight:800,color:T.danger}}>-{eur(r.amount)}</div>}
              {r.driveLink&&<a href={r.driveLink} target="_blank" rel="noreferrer" style={{display:"block",marginTop:8,fontSize:12,color:T.info,textDecoration:"none"}}>📄 In Google Drive öffnen ↗</a>}
            </div>
          ))}
        </div>
      )}
      {modal&&<Modal title="Beleg hinzufügen" onClose={()=>setModal(false)}>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {[["upload","⬆ Datei hochladen"],["create","✎ Beleg erstellen"]].map(([v,l])=>(
            <TBtn key={v} active={tab===v} color={T.accent} onClick={()=>setTab(v)}>{l}</TBtn>
          ))}
        </div>
        {tab==="upload"?(
          <div style={{display:"grid",gap:12}}>
            <div onClick={()=>ref.current.click()} style={{border:`2px dashed ${T.cardBorder}`,borderRadius:12,padding:24,textAlign:"center",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.accent} onMouseLeave={e=>e.currentTarget.style.borderColor=T.cardBorder}>
              <input ref={ref} type="file" onChange={e=>{const f=e.target.files[0];if(f)setForm(x=>({...x,file:f,name:x.name||f.name}));}} style={{display:"none"}} accept=".pdf,.jpg,.jpeg,.png"/>
              <div style={{fontSize:28,marginBottom:8}}>⬆</div>
              <div style={{color:T.sub,fontSize:13}}>{form.file?form.file.name:"Klicken zum Hochladen (PDF, JPG, PNG)"}</div>
            </div>
            <F l="Bezeichnung" v={form.name} s={v=>setForm(f=>({...f,name:v}))} p="z.B. Amazon Rechnung"/>
            <R2><F l="Datum" t="date" v={form.date} s={v=>setForm(f=>({...f,date:v}))}/><F l="Betrag (€)" t="number" v={form.amount} s={v=>setForm(f=>({...f,amount:v}))} p="0.00"/></R2>
            <div><Lbl>Kategorie</Lbl><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={IS}><option value="">Wählen...</option>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          </div>
        ):(
          <div style={{display:"grid",gap:12}}>
            <R2><F l="Datum" t="date" v={cf.date} s={v=>setCf(f=>({...f,date:v}))}/><F l="Anbieter" v={cf.vendor} s={v=>setCf(f=>({...f,vendor:v}))} p="z.B. MediaMarkt"/></R2>
            <R2><F l="Betrag (€)" t="number" v={cf.amount} s={v=>setCf(f=>({...f,amount:v}))} p="0.00"/><div><Lbl>Kategorie</Lbl><select value={cf.category} onChange={e=>setCf(f=>({...f,category:e.target.value}))} style={IS}><option value="">Wählen...</option>{CATS.map(c=><option key={c}>{c}</option>)}</select></div></R2>
            <div><Lbl>Notiz</Lbl><textarea value={cf.note} onChange={e=>setCf(f=>({...f,note:e.target.value}))} rows={3} style={{...IS,resize:"vertical"}} placeholder="Was wurde gekauft?"/></div>
          </div>
        )}
        <BR style={{marginTop:16}}>
          <Btn onClick={save} disabled={uploading}>{uploading?"⟳ Lädt hoch...":"Speichern"}</Btn>
          {tab==="upload"&&form.file&&!drive.isTokenValid()&&<div style={{fontSize:11,color:T.warning,alignSelf:"center"}}>⚠ Mit Google verbinden um Datei in Drive zu speichern</div>}
          <BG onClick={()=>setModal(false)}>Abbrechen</BG>
        </BR>
      </Modal>}
    </div>
  );
}

// ── Time Tracking ─────────────────────────────────────────────────
function TimeTrack({data,setData}){
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({date:todayStr(),project:"",desc:"",hours:"",rate:""});
  const entries=data.timeEntries||[];
  const save=()=>{
    if(!form.project||!form.hours)return;
    setData(d=>({...d,timeEntries:[...(d.timeEntries||[]),{...form,id:uid(),hours:parseFloat(form.hours),rate:parseFloat(form.rate)||0}]}));
    setForm({date:todayStr(),project:"",desc:"",hours:"",rate:""});setModal(false);
  };
  const toInv=es=>{
    const yr=new Date().getFullYear();
    const ns=data.invoices.filter(i=>i.number?.startsWith(`RE-${yr}`)).map(i=>parseInt(i.number.split("-").pop())||0);
    const num=`RE-${yr}-${String(Math.max(0,...ns)+1).padStart(3,"0")}`;
    const items=es.map(e=>({id:uid(),desc:`${e.project}${e.desc?": "+e.desc:""}`,qty:e.hours,price:e.rate||0}));
    setData(d=>({...d,invoices:[...d.invoices,{id:uid(),number:num,date:todayStr(),dueDate:"",clientName:"",clientAddress:"",clientEmail:"",items,total:items.reduce((s,i)=>s+i.qty*i.price,0),status:"entwurf",note:"",createdAt:todayStr()}]}));
    alert(`Rechnung ${num} erstellt!`);
  };
  return(
    <div className="animate-in">
      <PHdr title="Zeiterfassung" sub="Stunden erfassen und abrechnen">
        <div style={{display:"flex",gap:8}}>
          {entries.length>0&&<BG onClick={()=>toInv(entries)}>→ Alle als Rechnung</BG>}
          <Btn onClick={()=>setModal(true)}>+ Zeit erfassen</Btn>
        </div>
      </PHdr>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:22}}>
        <SC l="Gesamtstunden" v={`${entries.reduce((s,e)=>s+e.hours,0).toFixed(1)} h`} c={T.accent}/>
        <SC l="Gesamtwert" v={eur(entries.reduce((s,e)=>s+e.hours*e.rate,0))} c={T.success}/>
        <SC l="Projekte" v={[...new Set(entries.map(e=>e.project))].length} c={T.info}/>
      </div>
      {entries.length===0?<EC icon="◷" title="Noch keine Zeiteinträge" sub="Erfasse deine Arbeitsstunden"/>:(
        <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["Datum","Projekt","Beschreibung","Stunden","Satz","Wert",""].map(h=><Th key={h}>{h}</Th>)}</tr></thead>
            <tbody>{[...entries].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>(
              <tr key={e.id} className="tr-hover">
                <Td s={{color:T.sub}}>{e.date}</Td>
                <Td><Tag c={T.accent}>{e.project}</Tag></Td>
                <Td>{e.desc}</Td>
                <Td s={{fontWeight:700}}>{e.hours} h</Td>
                <Td s={{color:T.sub}}>{eur(e.rate)}/h</Td>
                <Td s={{fontWeight:700,color:T.success}}>{eur(e.hours*e.rate)}</Td>
                <Td><div style={{display:"flex",gap:5}}>
                  <SB onClick={()=>toInv([e])} c={T.info}>→ Rechnung</SB>
                  <button onClick={()=>setData(d=>({...d,timeEntries:d.timeEntries.filter(x=>x.id!==e.id)}))} style={DelS}>✕</button>
                </div></Td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      )}
      {modal&&<Modal title="Zeit erfassen" onClose={()=>setModal(false)}>
        <div style={{display:"grid",gap:12}}>
          <R2><F l="Datum" t="date" v={form.date} s={v=>setForm(f=>({...f,date:v}))}/><F l="Projekt" v={form.project} s={v=>setForm(f=>({...f,project:v}))} p="Webseite Kunde X"/></R2>
          <F l="Beschreibung" v={form.desc} s={v=>setForm(f=>({...f,desc:v}))} p="Was wurde gemacht?"/>
          <R2><F l="Stunden" t="number" v={form.hours} s={v=>setForm(f=>({...f,hours:v}))} p="2.5"/><F l="Stundensatz (€)" t="number" v={form.rate} s={v=>setForm(f=>({...f,rate:v}))} p="85"/></R2>
          {form.hours&&form.rate&&<div style={{background:T.accentGlow,border:`1px solid ${T.accent}40`,borderRadius:8,padding:"10px 14px",display:"flex",justifyContent:"space-between"}}><span style={{color:T.sub,fontSize:13}}>Wert</span><span style={{fontWeight:800,color:T.accent}}>{eur(parseFloat(form.hours)*parseFloat(form.rate))}</span></div>}
          <BR><Btn onClick={save}>Speichern</Btn><BG onClick={()=>setModal(false)}>Abbrechen</BG></BR>
        </div>
      </Modal>}
    </div>
  );
}

// ── Reports ───────────────────────────────────────────────────────
function Reports({data}){
  const [year,setYear]=useState(new Date().getFullYear().toString());
  const years=[...new Set(data.transactions.map(t=>t.date?.slice(0,4)))].filter(Boolean).sort().reverse();
  if(!years.includes(year))years.push(year);
  const tx=data.transactions.filter(t=>t.date?.startsWith(year));
  const inc=tx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const exp=tx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const profit=inc-exp;
  const quarters=[1,2,3,4].map(q=>{
    const ms=[(q-1)*3+1,(q-1)*3+2,(q-1)*3+3];
    const qt=tx.filter(t=>ms.includes(new Date(t.date).getMonth()+1));
    const qi=qt.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const qe=qt.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    return{q,income:qi,expense:qe,profit:qi-qe};
  });
  const cats={};
  tx.filter(t=>t.type==="expense").forEach(t=>{cats[t.category]=(cats[t.category]||0)+t.amount;});
  return(
    <div className="animate-in">
      <PHdr title="Berichte & EÜR" sub="Einnahmenüberschussrechnung und Steuerübersicht">
        <select value={year} onChange={e=>setYear(e.target.value)} style={{...IS,width:"auto",padding:"8px 14px"}}>{years.map(y=><option key={y}>{y}</option>)}</select>
      </PHdr>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:22}}>
        <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:28}}>
          <div style={{fontWeight:800,fontSize:16,marginBottom:20,display:"flex",justifyContent:"space-between"}}>EÜR {year}<Tag c={T.accent}>Kleinunternehmer</Tag></div>
          {[
            {l:"Betriebseinnahmen",v:inc,c:T.success},{l:"Betriebsausgaben",v:exp,c:T.danger},
            null,
            {l:"Gewinn / Verlust",v:profit,c:profit>=0?T.success:T.danger,b:true},
            {l:"Steuerl. Bemessungsgrundlage",v:profit>0?profit:0,c:T.text},
            {l:"Geschätzte Steuer (~30%) *",v:(profit>0?profit:0)*0.3,c:T.warning},
          ].map((row,i)=>row===null?(
            <div key={i} style={{height:1,background:T.cardBorder,margin:"12px 0"}}/>
          ):(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:row.b?"none":`1px solid ${T.cardBorder}15`}}>
              <span style={{fontSize:13,color:row.b?T.text:T.sub,fontWeight:row.b?700:400}}>{row.l}</span>
              <span style={{fontSize:row.b?18:14,fontWeight:row.b?800:600,color:row.c}}>{eur(row.v)}</span>
            </div>
          ))}
          <div style={{fontSize:11,color:T.sub,marginTop:14}}>* Schätzung — bitte Steuerberater konsultieren.</div>
        </div>
        <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:28}}>
          <div style={{fontWeight:800,fontSize:15,marginBottom:16}}>Quartalsübersicht {year}</div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["Quartal","Einnahmen","Ausgaben","Gewinn"].map(h=><Th key={h}>{h}</Th>)}</tr></thead>
            <tbody>
              {quarters.map(q=>(
                <tr key={q.q} className="tr-hover">
                  <Td s={{fontWeight:700}}>Q{q.q} {year}</Td>
                  <Td s={{color:T.success,fontWeight:600}}>{eur(q.income)}</Td>
                  <Td s={{color:T.danger,fontWeight:600}}>{eur(q.expense)}</Td>
                  <Td s={{color:q.profit>=0?T.success:T.danger,fontWeight:800}}>{eur(q.profit)}</Td>
                </tr>
              ))}
              <tr style={{borderTop:`2px solid ${T.cardBorder}`}}>
                <Td s={{fontWeight:800}}>GESAMT</Td>
                <Td s={{color:T.success,fontWeight:800}}>{eur(inc)}</Td>
                <Td s={{color:T.danger,fontWeight:800}}>{eur(exp)}</Td>
                <Td s={{color:profit>=0?T.success:T.danger,fontWeight:800}}>{eur(profit)}</Td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:24,marginBottom:18}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>Ausgaben nach Kategorie</div>
        {Object.keys(cats).length===0?<Empty t="Keine Ausgaben"/>:(
          <div style={{display:"grid",gap:10}}>
            {Object.entries(cats).sort(([,a],[,b])=>b-a).map(([cat,val])=>(
              <div key={cat} style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:100,fontSize:13,color:T.sub,flexShrink:0}}>{cat}</div>
                <div style={{flex:1,height:8,background:T.muted,borderRadius:4}}><div style={{height:"100%",width:`${(val/exp)*100}%`,borderRadius:4,background:T.danger}}/></div>
                <div style={{width:100,textAlign:"right",fontWeight:700,fontSize:14}}>{eur(val)}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:24}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>22.000€ Kleinunternehmer-Grenze {year}</div>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:12}}>
          <div style={{flex:1,height:10,background:T.muted,borderRadius:5}}><div style={{height:"100%",width:`${Math.min((inc/LIMIT_22K)*100,100)}%`,borderRadius:5,background:inc>LIMIT_22K*0.9?T.danger:inc>LIMIT_22K*0.7?T.warning:T.success,transition:"width 0.8s"}}/></div>
          <div style={{fontWeight:800,fontSize:15}}>{((inc/LIMIT_22K)*100).toFixed(1)}%</div>
        </div>
        <div style={{display:"flex",gap:24}}>
          <div><div style={{fontSize:11,color:T.sub}}>Umsatz {year}</div><div style={{fontWeight:700,color:T.success}}>{eur(inc)}</div></div>
          <div><div style={{fontSize:11,color:T.sub}}>Limit</div><div style={{fontWeight:700}}>{eur(LIMIT_22K)}</div></div>
          <div><div style={{fontSize:11,color:T.sub}}>Verbleibend</div><div style={{fontWeight:700,color:LIMIT_22K-inc>0?T.text:T.danger}}>{eur(Math.max(0,LIMIT_22K-inc))}</div></div>
        </div>
      </div>
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────────
function Settings({profile,setProfile,gistCfg,saveGistCfg,data,manualSync,lastSync,drive}){
  const [saved,setSaved]=useState(false);
  const [gf,setGf]=useState({token:gistCfg.token||"",gistId:gistCfg.gistId||""});
  const [gLoading,setGLoading]=useState(false);
  const [gMsg,setGMsg]=useState("");
  const upd=k=>v=>setProfile(p=>({...p,[k]:v}));
  const save=()=>{setSaved(true);setTimeout(()=>setSaved(false),2500);};

  const connect=async()=>{
    if(!gf.token)return;
    setGLoading(true);setGMsg("");
    try{
      let gistId=gf.gistId;
      if(!gistId){
        const r=await gistCreate(gf.token,data,profile);
        gistId=r;
        setGMsg(`✓ Gist erstellt! ID: ${gistId}`);
      } else {
        const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{Authorization:`token ${gf.token}`}});
        if(!r.ok)throw new Error(`Gist nicht gefunden (${r.status})`);
        setGMsg("✓ Verbindung erfolgreich!");
      }
      setGf(f=>({...f,gistId}));
      saveGistCfg({token:gf.token,gistId});
      setTimeout(()=>setGMsg(""),4000);
    }catch(e){setGMsg(`✗ ${e.message}`);} 
    setGLoading(false);
  };

  return(
    <div className="animate-in">
      <PHdr title="Einstellungen" sub="Unternehmensdaten & GitHub Sync"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:26}}>
          <SL>Persönliche Daten</SL>
          <div style={{display:"grid",gap:12,marginTop:14}}>
            <F l="Vollständiger Name" v={profile.name} s={upd("name")} p="Max Mustermann"/>
            <F l="Unternehmensname" v={profile.company} s={upd("company")} p="Mustermann Media"/>
            <F l="Straße & Hausnummer" v={profile.street} s={upd("street")}/>
            <R2><F l="PLZ" v={profile.zip} s={upd("zip")}/><F l="Stadt" v={profile.city} s={upd("city")}/></R2>
            <F l="E-Mail" t="email" v={profile.email} s={upd("email")}/>
            <F l="Telefon" v={profile.phone} s={upd("phone")}/>
            <F l="Website" v={profile.website} s={upd("website")} p="www.meinbusiness.de"/>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:26}}>
            <SL>Steuer & Bank</SL>
            <div style={{display:"grid",gap:12,marginTop:14}}>
              <F l="Steuernummer" v={profile.taxNumber} s={upd("taxNumber")} p="12/345/67890"/>
              <F l="USt-IdNr. (optional)" v={profile.ustIdNr} s={upd("ustIdNr")} p="DE123456789"/>
              <F l="Bank" v={profile.bank} s={upd("bank")} p="Sparkasse XY"/>
              <F l="IBAN" v={profile.iban} s={upd("iban")} p="DE00 0000 ..."/>
              <F l="BIC" v={profile.bic} s={upd("bic")} p="XXXXXXXX"/>
            </div>
            <div style={{marginTop:14,padding:14,background:`${T.accent}08`,border:`1px solid ${T.accent}30`,borderRadius:10,fontSize:12,color:T.sub,lineHeight:1.7}}>
              💡 Kleinunternehmer §19 UStG: keine MwSt. auf Rechnungen.
            </div>
          </div>
          <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:26}}>
            <SL>Rechnungsvorlage</SL>
            <div style={{display:"grid",gap:12,marginTop:14}}>
              <F l="Zahlungsziel (Tage)" t="number" v={profile.paymentDays} s={upd("paymentDays")} p="14"/>
              <div><Lbl>Standard-Hinweis</Lbl><textarea value={profile.invoiceNote||""} onChange={e=>upd("invoiceNote")(e.target.value)} rows={3} style={{...IS,resize:"vertical"}}/></div>
            </div>
          </div>
        </div>
      </div>

      {/* GitHub Sync */}
      <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:14,padding:26,marginTop:20}}>
        <SL>☁ GitHub Gist Sync</SL>
        <div style={{marginTop:14}}>
          <div style={{background:"#0D1220",border:`1px solid ${T.cardBorder}`,borderRadius:10,padding:16,marginBottom:18,fontSize:12,color:T.sub,lineHeight:1.9}}>
            <div style={{fontWeight:700,color:T.text,marginBottom:8,fontSize:13}}>📋 Einrichtung in 3 Schritten:</div>
            <div><span style={{color:T.accent,fontWeight:700}}>1.</span> Gehe zu <a href="https://github.com/settings/tokens/new" target="_blank" rel="noreferrer" style={{color:T.info}}>github.com/settings/tokens/new</a></div>
            <div><span style={{color:T.accent,fontWeight:700}}>2.</span> Token erstellen mit nur <strong style={{color:T.text}}>„gist"</strong> Berechtigung</div>

          <div style={{display:"grid",gap:12}}>

            {gistCfg.token&&gistCfg.gistId&&<>
              <button className="btn" onClick={()=>manualSync("push")} style={{background:`${T.info}20`,color:T.info,border:`1px solid ${T.info}40`,borderRadius:9,padding:"10px 16px",fontWeight:700,fontSize:13,cursor:"pointer"}}>⬆ Jetzt hochladen</button>
              <button className="btn" onClick={()=>manualSync("pull")} style={{background:`${T.accent}20`,color:T.accent,border:`1px solid ${T.accent}40`,borderRadius:9,padding:"10px 16px",fontWeight:700,fontSize:13,cursor:"pointer"}}>⬇ Jetzt laden</button>
              <button className="btn" onClick={()=>{saveGistCfg({token:"",gistId:""});setGf({token:"",gistId:""});}} style={{background:`${T.danger}15`,color:T.danger,border:`1px solid ${T.danger}30`,borderRadius:9,padding:"10px 16px",fontWeight:600,fontSize:13,cursor:"pointer"}}>Trennen</button>

                {drive.driveStatus==="connecting"&&<span style={{color:T.info,fontSize:13}}>⟳ Verbinde...</span>}

              {drive.driveMsg&&<div style={{padding:"10px 14px",background:`${T.danger}15`,border:`1px solid ${T.danger}40`,borderRadius:8,fontSize:13,color:T.danger,fontWeight:600}}>{drive.driveMsg}</div>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Google Drive ──────────────────────────────────────────────────
const GDRIVE_CLIENT_ID = "927286688549-9t6u2dp12juhhi5hlms46js8huu7m2rb.apps.googleusercontent.com";
const GDRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";
const FOLDER_ROOT = "Buchhaltung";

let gTokenClient = null;
let gAccessToken = null;
let gTokenExpiry = null;

function isTokenValid() {
  return gAccessToken && gTokenExpiry && Date.now() < gTokenExpiry;
}

function initGoogleAuth(clientId, callback) {
  if (!window.google) return callback(new Error("Google SDK nicht geladen"));
  gTokenClient = window.google.accounts.oauth2.initTokenClient({
    client_id: clientId || GDRIVE_CLIENT_ID,
    scope: GDRIVE_SCOPE,
    callback: (resp) => {
      if (resp.error) return callback(new Error(resp.error));
      gAccessToken = resp.access_token;
      gTokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
      callback(null, resp.access_token);
    }
  });
  gTokenClient.requestAccessToken({ prompt: "consent" });
}

async function driveRequest(path, method = "GET", body = null, headers = {}) {
  if (!isTokenValid()) throw new Error("Nicht mit Google verbunden");
  const res = await fetch(`https://www.googleapis.com/drive/v3/${path}`, {
    method,
    headers: { Authorization: `Bearer ${gAccessToken}`, ...headers },
    body
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Drive Fehler ${res.status}`);
  }
  const ct = res.headers.get("content-type") || "";
  return ct.includes("application/json") ? res.json() : res.blob();
}

async function findOrCreateFolder(name, parentId = null) {
  const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false${parentId ? ` and '${parentId}' in parents` : ""}`;
  const res = await driveRequest(`files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  if (res.files && res.files.length > 0) return res.files[0].id;
  const meta = { name, mimeType: "application/vnd.google-apps.folder", ...(parentId ? { parents: [parentId] } : {}) };
  const created = await driveRequest("files?fields=id", "POST", JSON.stringify(meta), { "Content-Type": "application/json" });
  return created.id;
}

async function uploadFileToDrive(file, subFolder) {
  const rootId = await findOrCreateFolder(FOLDER_ROOT);
  const folderId = await findOrCreateFolder(subFolder, rootId);
  const meta = { name: file.name || "Datei", parents: [folderId] };
  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(meta)], { type: "application/json" }));
  form.append("file", file);
  const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink", {
    method: "POST",
    headers: { Authorization: `Bearer ${gAccessToken}` },
    body: form
  });
  if (!res.ok) throw new Error(`Upload fehlgeschlagen: ${res.status}`);
  return res.json();
}

async function uploadJsonToDrive(filename, jsonData, subFolder) {
  const rootId = await findOrCreateFolder(FOLDER_ROOT);
  const folderId = await findOrCreateFolder(subFolder, rootId);
  const blob = new Blob([JSON.stringify(jsonData, null, 2)], { type: "application/json" });
  const file = new File([blob], filename, { type: "application/json" });
  const meta = { name: filename, parents: [folderId] };
  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(meta)], { type: "application/json" }));
  form.append("file", file);
  const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink", {
    method: "POST",
    headers: { Authorization: `Bearer ${gAccessToken}` },
    body: form
  });
  if (!res.ok) throw new Error(`Backup fehlgeschlagen: ${res.status}`);
  return res.json();
}

// ── Google Drive Hook ─────────────────────────────────────────────
function useGoogleDrive() {
  const [connected, setConnected] = useState(false);
  const [driveStatus, setDriveStatus] = useState("idle");
  const [driveMsg, setDriveMsg] = useState("");

  const showMsg = (msg, isError = false) => {
    setDriveStatus(isError ? "error" : "success");
    setDriveMsg(msg);
    setTimeout(() => { setDriveStatus("idle"); setDriveMsg(""); }, 4000);
  };

  const connect = (clientId) => new Promise((res, rej) => {
    setDriveStatus("connecting");
    initGoogleAuth(clientId, (err) => {
      if (err) { setDriveStatus("idle"); rej(err); }
      else { setConnected(true); setDriveStatus("idle"); res(); }
    });
  });

  const uploadFile = async (file, subfolder = "Belege") => {
    if (!isTokenValid()) throw new Error("Bitte erst mit Google verbinden");
    setDriveStatus("uploading");
    try {
      const result = await uploadFileToDrive(file, subfolder);
      showMsg(`✓ "${result.name}" hochgeladen`);
      return result;
    } catch (e) { showMsg(e.message, true); throw e; }
  };

  const backup = async (data, profile) => {
    if (!isTokenValid()) return;
    try {
      const filename = `backup-${new Date().toISOString().slice(0,10)}.json`;
      await uploadJsonToDrive(filename, { data, profile, backupDate: new Date().toISOString() }, "Backups");
      showMsg("✓ Backup in Google Drive gespeichert");
    } catch (e) { showMsg(e.message, true); }
  };

  return { connected, driveStatus, driveMsg, connect, uploadFile, backup, isTokenValid };
}

// ── Drive Status Badge ────────────────────────────────────────────
function DriveBadge({ driveStatus, driveMsg, connected }) {
  const C = { idle: connected ? T.success : T.sub, connecting: T.info, uploading: T.info, success: T.success, error: T.danger };
  const I = { idle: connected ? "✓" : "◎", connecting: "⟳", uploading: "⬆", success: "✓", error: "⚠" };
  const L = { idle: connected ? "Drive verbunden" : "Drive nicht verbunden", connecting: "Verbinde...", uploading: "Lädt hoch...", success: driveMsg, error: driveMsg };
  const c = C[driveStatus] || T.sub;
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 12px", background:`${c}18`, border:`1px solid ${c}40`, borderRadius:8 }}>
      <span style={{ color:c, fontSize:13, display:"inline-block", animation:(driveStatus==="connecting"||driveStatus==="uploading")?"spin 1s linear infinite":"none" }}>{I[driveStatus]}</span>
      <span style={{ fontSize:12, color:c, fontWeight:600 }}>{L[driveStatus]}</span>
    </div>
  );
}
